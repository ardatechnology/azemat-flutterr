workflows:
  android-build:
    name: ساخت APK موزه شیراز
instance_type: mac_mini_m2
max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: دریافت وابستگی‌ها
        script: flutter pub get
      - name: ساخت APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
