workflows:
  android-build:
    name: Build Shiraz Museum APK
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: 3.24.5
    scripts:
      - name: Get dependencies
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
